name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git unzip zip \
            openjdk-17-jdk \
            build-essential ccache \
            libssl-dev libffi-dev \
            libsqlite3-dev \
            autoconf automake libtool libtool-bin \
            pkg-config cmake

      - name: Fix autoconf macro compatibility (LT_SYS_SYMBOL_USCORE)
        run: |
          # autoconf 2.71 errors on undefined macros used in libffi 3.3 configure.ac.
          # Wrap autoconf so autoreconf calls it with -Wno-portability to suppress.
          sudo tee /usr/local/bin/autoconf > /dev/null << 'EOF'
          #!/bin/bash
          exec /usr/bin/autoconf -Wno-portability "$@"
          EOF
          sudo chmod +x /usr/local/bin/autoconf
          # Verify the wrapper is picked up first
          which autoconf
          autoconf --version | head -1

      - name: Install Buildozer & Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Cache Buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-ubuntu22-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-ubuntu22-buildozer-

      - name: Build APK
        run: buildozer android debug 2>&1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mma-legends-apk
          path: bin/*.apk
          retention-days: 30
