name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    # Ubuntu 20.04 ships autoconf 2.69 which is compatible with the
    # libffi 3.3 configure.ac used in python-for-android.
    # Ubuntu 22/24 ships autoconf 2.71 which errors on LT_SYS_SYMBOL_USCORE.
    runs-on: ubuntu-20.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git unzip zip \
            openjdk-17-jdk \
            build-essential ccache \
            libssl-dev libffi-dev \
            libsqlite3-dev \
            autoconf automake libtool \
            pkg-config cmake

      - name: Install Buildozer & Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Cache Buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-ubuntu20-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-ubuntu20-buildozer-

      - name: Build APK
        run: buildozer android debug 2>&1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mma-legends-apk
          path: bin/*.apk
          retention-days: 30
